<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku on the Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="miku-container">
        <img id="miku" src="assets/miku_idle.png" alt="Miku">
    </div>

    <div class="content">
        <h1>Welcome to Miku on the Web</h1>
        <p>A cute animated character that follows your cursor.</p>
    </div>

    <!-- Sounds -->
    <audio id="awake-sound" src="assets/awake.wav"></audio>
    <audio id="idle1-sound" src="assets/idle1.wav"></audio>
    <audio id="idle2-sound" src="assets/idle2.wav"></audio>
    <audio id="idle3-sound" src="assets/idle3.wav"></audio>
    <audio id="sleep-sound" src="assets/sleep.wav"></audio>

    <script src="script.js"></script>

</body>
</html>
